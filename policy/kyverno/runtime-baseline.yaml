apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: cloudshell-runtime-baseline
  annotations:
    policies.kyverno.io/title: Runtime Baseline for Managed Session Pods
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Apply conservative runtime hardening to cloudshell-managed session pods.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-hardened-managed-session-pods
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"cloudshell.io/managed\" || '' }}"
            operator: Equals
            value: "true"
      validate:
        message: Managed session pods must run non-root, disable privilege escalation, drop capabilities, and use RuntimeDefault seccomp.
        pattern:
          spec:
            =(hostNetwork): false
            =(hostPID): false
            =(hostIPC): false
            containers:
              - securityContext:
                  runAsNonRoot: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  seccompProfile:
                    type: RuntimeDefault
            =(initContainers):
              - securityContext:
                  runAsNonRoot: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  seccompProfile:
                    type: RuntimeDefault
            =(ephemeralContainers):
              - securityContext:
                  runAsNonRoot: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  seccompProfile:
                    type: RuntimeDefault
