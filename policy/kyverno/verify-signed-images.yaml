apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: cloudshell-verify-signed-images
  annotations:
    policies.kyverno.io/title: Verify Signed Images
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Verify signatures for approved cloudshell-fog runtime and service images.
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-socioprophet-and-socios-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/socioprophet/*"
            - "ghcr.io/socios-linux/*"
          required: true
          mutateDigest: true
          verifyDigest: true
          attestors:
            - count: 1
              entries:
                - keys:
                    # Replace this placeholder with the real cosign public key or
                    # adapt this policy to keyless verification before production use.
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      REPLACE_WITH_REAL_COSIGN_PUBLIC_KEY
                      -----END PUBLIC KEY-----
